<!DOCTYPE html>
<html>
    <head>
        <title>DOM</title>
    </head>
<body>
    <p id="text">Hello World</p>
    <button onclick="changetext()">Click here.!</button>

    <script>
        function changetext(){
            document.getElementById("text").innerHTML="Changed Text";
        }
    </script>

</body>
</html>
